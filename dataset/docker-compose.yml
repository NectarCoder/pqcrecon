services:
  openssl-pqc:
    build:
      context: ..
      dockerfile: dataset/Dockerfile
    image: pqcrecon-openssl-pqc:latest
    working_dir: /workspace
    volumes:
      - ./generate_certs.sh:/usr/local/bin/generate_certs.sh:ro
      - ./start_servers.sh:/usr/local/bin/start_servers.sh:ro
      - ./certs:/certs
      - ./logs:/workspace/logs
      - ./generate_traffic.py:/workspace/generate_traffic.py:ro
      - ./pcaps:/workspace/pcaps
    environment:
      CERT_DAYS: "365"
      CERT_SUBJECT: /C=US/ST=Georgia/L=Kennesaw/O=PQCRecon/OU=Dataset/CN=localhost
      LOG_DIR: /workspace/logs
    ports:
      - "4431:4431"
      - "4432:4432"
      - "4433:4433"
      - "4434:4434"
      - "4435:4435"
    command: ["bash", "/usr/local/bin/generate_certs.sh"]